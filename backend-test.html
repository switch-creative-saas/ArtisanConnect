<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Backend Test - ArtisanConnect</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; }
    .test { margin: 20px 0; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
    .info { background: #d1ecf1; color: #0c5460; }
    button { background: #6366f1; color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; margin: 5px; }
    pre { background: #f8f9fa; padding: 10px; border-radius: 4px; overflow-x: auto; }
  </style>
</head>
<body>
  <h1>Backend API Test</h1>
  <p>This tests if your PHP backend is working correctly.</p>
  
  <div class="test">
    <h3>1. Test Database Connection</h3>
    <button onclick="testDatabase()">Test Database</button>
    <div id="dbResult"></div>
  </div>
  
  <div class="test">
    <h3>2. Test Artisan API</h3>
    <button onclick="testArtisans()">Test Artisans API</button>
    <div id="artisansResult"></div>
  </div>
  
  <div class="test">
    <h3>3. Test Conversations API</h3>
    <button onclick="testConversations()">Test Conversations API</button>
    <div id="conversationsResult"></div>
  </div>
  
  <div class="test">
    <h3>4. Direct API Test</h3>
    <button onclick="testDirectAPI()">Test Direct API Call</button>
    <div id="directResult"></div>
  </div>

  <script>
    const API_BASE = './backend/api';
    
    function showResult(elementId, message, type = 'info') {
      const element = document.getElementById(elementId);
      element.innerHTML = `<div class="${type}">${message}</div>`;
    }

    async function testDatabase() {
      try {
        const response = await fetch(`${API_BASE}/artisans/index.php?limit=1`);
        const data = await response.json();
        
        if (response.ok && data.ok) {
          showResult('dbResult', 'Database connection working!', 'success');
        } else {
          showResult('dbResult', `Database error: ${data.error || 'Unknown error'}`, 'error');
        }
      } catch (error) {
        showResult('dbResult', `Network error: ${error.message}. Make sure your local server is running.`, 'error');
      }
    }

    async function testArtisans() {
      try {
        const response = await fetch(`${API_BASE}/artisans/index.php`);
        const data = await response.json();
        
        if (response.ok && data.ok) {
          showResult('artisansResult', `Found ${data.artisans.length} artisans. API working!`, 'success');
        } else {
          showResult('artisansResult', `API error: ${data.error || 'Unknown error'}`, 'error');
        }
      } catch (error) {
        showResult('artisansResult', `Network error: ${error.message}`, 'error');
      }
    }

    async function testConversations() {
      try {
        const response = await fetch(`${API_BASE}/conversations/index.php`, {
          credentials: 'include'
        });
        const data = await response.json();
        
        if (response.ok) {
          if (data.ok) {
            showResult('conversationsResult', `Found ${data.conversations.length} conversations. Auth working!`, 'success');
          } else {
            showResult('conversationsResult', `Auth required (normal): ${data.error || 'Login required'}`, 'info');
          }
        } else {
          showResult('conversationsResult', `API error: ${response.status}`, 'error');
        }
      } catch (error) {
        showResult('conversationsResult', `Network error: ${error.message}`, 'error');
      }
    }

    async function testDirectAPI() {
      try {
        const response = await fetch(`${API_BASE}/artisans/show.php?id=1`);
        const data = await response.json();
        
        if (response.ok && data.ok) {
          showResult('directResult', 
            `API working! Artisan: ${data.artisan.name} - ${data.artisan.service}`, 
            'success');
        } else {
          showResult('directResult', `API error: ${data.error || 'Unknown error'}`, 'error');
        }
      } catch (error) {
        showResult('directResult', `Network error: ${error.message}`, 'error');
      }
    }

    // Auto-run database test on load
    window.addEventListener('load', () => {
      testDatabase();
    });
  </script>
</body>
</html>
