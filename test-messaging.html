<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messaging Test - ArtisanConnect</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .test-container { max-width: 800px; margin: 40px auto; padding: 20px; }
    .test-section { margin: 20px 0; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
    .test-button { background: #6366f1; color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; margin: 5px; }
    .test-result { margin: 10px 0; padding: 10px; border-radius: 4px; }
    .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
  </style>
</head>
<body>
  <div class="test-container">
    <h1>ArtisanConnect Messaging Test</h1>
    <p>This page tests the complete messaging flow from artisan profiles to real-time chat.</p>
    
    <div class="test-section">
      <h3>1. Test Artisan Profile</h3>
      <button class="test-button" onclick="testArtisanProfile()">Test Artisan Profile API</button>
      <div id="profileResult"></div>
    </div>
    
    <div class="test-section">
      <h3>2. Test Conversation Creation</h3>
      <button class="test-button" onclick="testCreateConversation()">Create Conversation</button>
      <div id="conversationResult"></div>
    </div>
    
    <div class="test-section">
      <h3>3. Test Messaging</h3>
      <input type="text" id="testMessage" placeholder="Type test message" style="width: 300px; padding: 8px; margin-right: 10px;">
      <button class="test-button" onclick="testSendMessage()">Send Message</button>
      <div id="messageResult"></div>
    </div>
    
    <div class="test-section">
      <h3>4. Quick Links</h3>
      <button class="test-button" onclick="window.open('pages/artisan-profile.html?id=1', '_blank')">Open Artisan Profile</button>
      <button class="test-button" onclick="window.open('pages/search.html', '_blank')">Open Search</button>
      <button class="test-button" onclick="window.open('pages/messages.html', '_blank')">Open Messages</button>
      <button class="test-button" onclick="window.open('pages/hire-step-1.html?artisan=1', '_blank')">Test Hire Flow</button>
    </div>
  </div>

  <script>
    let testConversationId = null;
    const API_BASE = './backend/api';

    function showResult(elementId, message, type = 'info') {
      const element = document.getElementById(elementId);
      element.innerHTML = `<div class="test-result ${type}">${message}</div>`;
    }

    async function testArtisanProfile() {
      try {
        const response = await fetch(`${API_BASE}/artisans/show.php?id=1`);
        const data = await response.json();
        
        if (data.ok && data.artisan) {
          showResult('profileResult', 
            `✅ Artisan Profile Loaded: ${data.artisan.name} - ${data.artisan.service} - Rating: ${data.artisan.rating}`, 
            'success');
        } else {
          showResult('profileResult', `❌ Failed to load artisan profile: ${data.error || 'Unknown error'}`, 'error');
        }
      } catch (error) {
        showResult('profileResult', `❌ Network error: ${error.message}`, 'error');
      }
    }

    async function testCreateConversation() {
      try {
        // First login (you'll need to be logged in)
        const response = await fetch(`${API_BASE}/conversations/start.php`, {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ artisanId: 1 })
        });
        
        const data = await response.json();
        
        if (data.ok && data.conversationId) {
          testConversationId = data.conversationId;
          showResult('conversationResult', 
            `✅ Conversation created: ID ${data.conversationId}`, 
            'success');
        } else {
          showResult('conversationResult', `❌ Failed to create conversation: ${data.error || 'Unknown error'}`, 'error');
        }
      } catch (error) {
        showResult('conversationResult', `❌ Network error: ${error.message}`, 'error');
      }
    }

    async function testSendMessage() {
      if (!testConversationId) {
        showResult('messageResult', '❌ Please create a conversation first', 'error');
        return;
      }

      const message = document.getElementById('testMessage').value.trim();
      if (!message) {
        showResult('messageResult', '❌ Please enter a message', 'error');
        return;
      }

      try {
        const response = await fetch(`${API_BASE}/conversations/messages.php?id=${testConversationId}`, {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ content: message })
        });
        
        const data = await response.json();
        
        if (data.ok) {
          showResult('messageResult', 
            `✅ Message sent: "${message}"`, 
            'success');
          document.getElementById('testMessage').value = '';
        } else {
          showResult('messageResult', `❌ Failed to send message: ${data.error || 'Unknown error'}`, 'error');
        }
      } catch (error) {
        showResult('messageResult', `❌ Network error: ${error.message}`, 'error');
      }
    }

    // Auto-run profile test on load
    window.addEventListener('load', () => {
      testArtisanProfile();
    });
  </script>
</body>
</html>
