<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Backend Diagnostic - ArtisanConnect</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 1000px; margin: 40px auto; padding: 20px; }
    .test { margin: 20px 0; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
    .warning { background: #fff3cd; color: #856404; }
    .info { background: #d1ecf1; color: #0c5460; }
    button { background: #6366f1; color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; margin: 5px; }
    pre { background: #f8f9fa; padding: 10px; border-radius: 4px; overflow-x: auto; font-size: 12px; }
    .status { font-weight: bold; }
    .url { font-family: monospace; background: #f0f0f0; padding: 2px 6px; border-radius: 3px; }
  </style>
</head>
<body>
  <h1>Backend Connection Diagnostic</h1>
  <p>Testing connection to: <span class="url">https://artisanconnect.page.gd</span></p>
  
  <div class="test">
    <h3>1. Basic Connectivity Test</h3>
    <button onclick="testBasicConnectivity()">Test Base URL</button>
    <div id="basicResult"></div>
  </div>
  
  <div class="test">
    <h3>2. API Directory Test</h3>
    <button onclick="testApiDirectory()">Test API Directory</button>
    <div id="apiDirResult"></div>
  </div>
  
  <div class="test">
    <h3>3. CORS Preflight Test</h3>
    <button onclick="testCorsPreflight()">Test CORS Preflight</button>
    <div id="corsResult"></div>
  </div>
  
  <div class="test">
    <h3>4. Artisans API Test</h3>
    <button onclick="testArtisansApi()">Test Artisans API</button>
    <div id="artisansResult"></div>
  </div>
  
  <div class="test">
    <h3>5. Auth API Test</h3>
    <button onclick="testAuthApi()">Test Auth API</button>
    <div id="authResult"></div>
  </div>
  
  <div class="test">
    <h3>6. Detailed Error Analysis</h3>
    <button onclick="runFullDiagnostic()">Run Full Diagnostic</button>
    <div id="diagnosticResult"></div>
  </div>

  <script>
    const BACKEND_BASE = "https://artisanconnect.page.gd";
    const API_BASE = "https://artisanconnect.page.gd/backend/api";
    
    function showResult(elementId, message, type = 'info') {
      const element = document.getElementById(elementId);
      element.innerHTML = `<div class="${type}">${message}</div>`;
    }

    function showDetailedResult(elementId, title, details, type = 'info') {
      const element = document.getElementById(elementId);
      let html = `<div class="${type}"><h4>${title}</h4>`;
      
      if (typeof details === 'object') {
        html += '<pre>' + JSON.stringify(details, null, 2) + '</pre>';
      } else {
        html += `<p>${details}</p>`;
      }
      
      html += '</div>';
      element.innerHTML = html;
    }

    async function testBasicConnectivity() {
      try {
        const response = await fetch(BACKEND_BASE, {
          method: 'GET',
          mode: 'cors'
        });
        
        showDetailedResult('basicResult', 'Base URL Response', {
          status: response.status,
          statusText: response.statusText,
          ok: response.ok,
          headers: Object.fromEntries(response.headers.entries())
        }, response.ok ? 'success' : 'error');
        
      } catch (error) {
        showDetailedResult('basicResult', 'Base URL Error', {
          message: error.message,
          name: error.name,
          stack: error.stack
        }, 'error');
      }
    }

    async function testApiDirectory() {
      try {
        const response = await fetch(`${BACKEND_BASE}/backend`, {
          method: 'GET',
          mode: 'cors'
        });
        
        showDetailedResult('apiDirResult', 'API Directory Response', {
          status: response.status,
          statusText: response.statusText,
          ok: response.ok,
          headers: Object.fromEntries(response.headers.entries())
        }, response.ok ? 'success' : 'warning');
        
      } catch (error) {
        showDetailedResult('apiDirResult', 'API Directory Error', {
          message: error.message,
          name: error.name
        }, 'error');
      }
    }

    async function testCorsPreflight() {
      try {
        const response = await fetch(`${API_BASE}/artisans/index.php`, {
          method: 'OPTIONS',
          mode: 'cors',
          headers: {
            'Content-Type': 'application/json',
            'Origin': window.location.origin
          }
        });
        
        showDetailedResult('corsResult', 'CORS Preflight Response', {
          status: response.status,
          statusText: response.statusText,
          ok: response.ok,
          headers: Object.fromEntries(response.headers.entries())
        }, response.ok ? 'success' : 'error');
        
      } catch (error) {
        showDetailedResult('corsResult', 'CORS Preflight Error', {
          message: error.message,
          name: error.name
        }, 'error');
      }
    }

    async function testArtisansApi() {
      try {
        const response = await fetch(`${API_BASE}/artisans/index.php?limit=1`, {
          method: 'GET',
          mode: 'cors',
          credentials: 'include',
          headers: {
            'Content-Type': 'application/json',
            'Origin': window.location.origin
          }
        });
        
        const data = await response.text();
        
        let parsedData;
        try {
          parsedData = JSON.parse(data);
        } catch (e) {
          parsedData = { rawResponse: data };
        }
        
        showDetailedResult('artisansResult', 'Artisans API Response', {
          status: response.status,
          statusText: response.statusText,
          ok: response.ok,
          headers: Object.fromEntries(response.headers.entries()),
          data: parsedData
        }, response.ok ? 'success' : 'error');
        
      } catch (error) {
        showDetailedResult('artisansResult', 'Artisans API Error', {
          message: error.message,
          name: error.name
        }, 'error');
      }
    }

    async function testAuthApi() {
      try {
        const response = await fetch(`${API_BASE}/auth/me.php`, {
          method: 'GET',
          mode: 'cors',
          credentials: 'include',
          headers: {
            'Content-Type': 'application/json',
            'Origin': window.location.origin
          }
        });
        
        const data = await response.text();
        
        let parsedData;
        try {
          parsedData = JSON.parse(data);
        } catch (e) {
          parsedData = { rawResponse: data };
        }
        
        showDetailedResult('authResult', 'Auth API Response', {
          status: response.status,
          statusText: response.statusText,
          ok: response.ok,
          headers: Object.fromEntries(response.headers.entries()),
          data: parsedData
        }, response.ok ? 'success' : 'warning');
        
      } catch (error) {
        showDetailedResult('authResult', 'Auth API Error', {
          message: error.message,
          name: error.name
        }, 'error');
      }
    }

    async function runFullDiagnostic() {
      const results = {
        timestamp: new Date().toISOString(),
        userAgent: navigator.userAgent,
        origin: window.location.origin,
        tests: {}
      };
      
      showResult('diagnosticResult', 'Running full diagnostic...', 'info');
      
      // Test 1: Basic connectivity
      try {
        const response = await fetch(BACKEND_BASE, { method: 'GET', mode: 'cors' });
        results.tests.basic = {
          status: response.status,
          ok: response.ok,
          headers: Object.fromEntries(response.headers.entries())
        };
      } catch (error) {
        results.tests.basic = { error: error.message };
      }
      
      // Test 2: API endpoint
      try {
        const response = await fetch(`${API_BASE}/artisans/index.php?limit=1`, {
          method: 'GET',
          mode: 'cors',
          credentials: 'include'
        });
        results.tests.artisans = {
          status: response.status,
          ok: response.ok,
          headers: Object.fromEntries(response.headers.entries())
        };
      } catch (error) {
        results.tests.artisans = { error: error.message };
      }
      
      // Test 3: CORS preflight
      try {
        const response = await fetch(`${API_BASE}/artisans/index.php`, {
          method: 'OPTIONS',
          mode: 'cors'
        });
        results.tests.cors = {
          status: response.status,
          ok: response.ok,
          headers: Object.fromEntries(response.headers.entries())
        };
      } catch (error) {
        results.tests.cors = { error: error.message };
      }
      
      // Analysis
      let analysis = '';
      let type = 'info';
      
      if (results.tests.basic.error) {
        analysis = '❌ Backend server is not accessible. Check if the server is running and the URL is correct.';
        type = 'error';
      } else if (!results.tests.basic.ok) {
        analysis = '⚠️ Backend server responded but with error status. Check server configuration.';
        type = 'warning';
      } else if (results.tests.artisans.error) {
        analysis = '❌ API endpoints not accessible. Likely CORS or routing issue.';
        type = 'error';
      } else if (results.tests.cors.error || results.tests.cors.status !== 204) {
        analysis = '⚠️ CORS preflight failed. CORS headers may not be properly configured.';
        type = 'warning';
      } else {
        analysis = '✅ Backend connection appears to be working correctly!';
        type = 'success';
      }
      
      showDetailedResult('diagnosticResult', 'Full Diagnostic Results', {
        results: results,
        analysis: analysis
      }, type);
    }

    // Auto-run basic connectivity test on load
    window.addEventListener('load', () => {
      testBasicConnectivity();
    });
  </script>
</body>
</html>
