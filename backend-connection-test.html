<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Backend Connection Test - ArtisanConnect</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; }
    .test { margin: 20px 0; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
    .info { background: #d1ecf1; color: #0c5460; }
    button { background: #6366f1; color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; margin: 5px; }
    pre { background: #f8f9fa; padding: 10px; border-radius: 4px; overflow-x: auto; }
  </style>
</head>
<body>
  <h1>Backend Connection Test</h1>
  <p>Testing connection to: <strong>https://artisanconnect.page.gd/backend/api</strong></p>
  
  <div class="test">
    <h3>1. Test Artisans API</h3>
    <button onclick="testArtisans()">Test Artisans</button>
    <div id="artisansResult"></div>
  </div>
  
  <div class="test">
    <h3>2. Test Orders API</h3>
    <button onclick="testOrders()">Test Orders</button>
    <div id="ordersResult"></div>
  </div>
  
  <div class="test">
    <h3>3. Test Conversations API</h3>
    <button onclick="testConversations()">Test Conversations</button>
    <div id="conversationsResult"></div>
  </div>
  
  <div class="test">
    <h3>4. Test Authentication</h3>
    <button onclick="testAuth()">Test Auth</button>
    <div id="authResult"></div>
  </div>

  <script>
    const API_BASE = "https://artisanconnect.page.gd/backend/api";
    
    function showResult(elementId, message, type = 'info') {
      const element = document.getElementById(elementId);
      element.innerHTML = `<div class="${type}">${message}</div>`;
    }

    async function testArtisans() {
      try {
        const response = await fetch(`${API_BASE}/artisans/index.php?limit=5`);
        const data = await response.json();
        
        if (response.ok && data.ok) {
          showResult('artisansResult', 
            `✅ Artisans API working! Found ${data.artisans.length} artisans. First artisan: ${data.artisans[0]?.name || 'None'}`, 
            'success');
        } else {
          showResult('artisansResult', `❌ Artisans API error: ${data.error || 'Unknown error'}`, 'error');
        }
      } catch (error) {
        showResult('artisansResult', `❌ Network error: ${error.message}`, 'error');
      }
    }

    async function testOrders() {
      try {
        const response = await fetch(`${API_BASE}/orders/index.php`, {
          credentials: 'include'
        });
        const data = await response.json();
        
        if (response.ok) {
          if (data.ok) {
            showResult('ordersResult', `✅ Orders API working! Found ${data.orders.length} orders.`, 'success');
          } else {
            showResult('ordersResult', `ℹ️ Orders API working (auth required): ${data.error || 'Login required'}`, 'info');
          }
        } else {
          showResult('ordersResult', `❌ Orders API error: ${response.status}`, 'error');
        }
      } catch (error) {
        showResult('ordersResult', `❌ Network error: ${error.message}`, 'error');
      }
    }

    async function testConversations() {
      try {
        const response = await fetch(`${API_BASE}/conversations/index.php`, {
          credentials: 'include'
        });
        const data = await response.json();
        
        if (response.ok) {
          if (data.ok) {
            showResult('conversationsResult', `✅ Conversations API working! Found ${data.conversations.length} conversations.`, 'success');
          } else {
            showResult('conversationsResult', `ℹ️ Conversations API working (auth required): ${data.error || 'Login required'}`, 'info');
          }
        } else {
          showResult('conversationsResult', `❌ Conversations API error: ${response.status}`, 'error');
        }
      } catch (error) {
        showResult('conversationsResult', `❌ Network error: ${error.message}`, 'error');
      }
    }

    async function testAuth() {
      try {
        const response = await fetch(`${API_BASE}/auth/me.php`, {
          credentials: 'include'
        });
        const data = await response.json();
        
        if (response.ok) {
          if (data.ok) {
            showResult('authResult', `✅ Auth API working! User: ${data.user?.firstName || 'Unknown'}`, 'success');
          } else {
            showResult('authResult', `ℹ️ Auth API working (not logged in): ${data.error || 'Not logged in'}`, 'info');
          }
        } else {
          showResult('authResult', `❌ Auth API error: ${response.status}`, 'error');
        }
      } catch (error) {
        showResult('authResult', `❌ Network error: ${error.message}`, 'error');
      }
    }

    // Auto-run artisans test on load
    window.addEventListener('load', () => {
      testArtisans();
    });
  </script>
</body>
</html>
