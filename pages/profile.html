<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - ArtisanConnect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>
  <div class="toast-container" id="toastContainer"></div>
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

  <div class="dashboard">
    <button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()" aria-label="Open menu">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="12" x2="21" y2="12"></line>
        <line x1="3" y1="6" x2="21" y2="6"></line>
        <line x1="3" y1="18" x2="21" y2="18"></line>
      </svg>
    </button>

    <aside class="dashboard-sidebar" id="dashboardSidebar">
      <div class="sidebar-profile">
        <div class="sidebar-user">
          <img src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=100&h=100&fit=crop" alt="User" class="sidebar-user-avatar" id="sidebarAvatar">
          <div class="sidebar-user-info">
            <h4 id="sidebarUserName">John Doe</h4>
            <p>Client</p>
          </div>
        </div>
      </div>

      <nav class="sidebar-nav">
        <div class="sidebar-nav-section">
          <p class="sidebar-nav-title">Main</p>
          <ul class="sidebar-nav-list">
            <li class="sidebar-nav-item"><a href="../index.html" class="sidebar-nav-link">Landing Page</a></li>
            <li class="sidebar-nav-item"><a href="dashboard.html" class="sidebar-nav-link">Dashboard</a></li>
            <li class="sidebar-nav-item"><a href="search.html" class="sidebar-nav-link">Find Artisans</a></li>
            <li class="sidebar-nav-item"><a href="messages.html" class="sidebar-nav-link">Messages</a></li>
            <li class="sidebar-nav-item"><a href="favourites.html" class="sidebar-nav-link">Favourites</a></li>
          </ul>
        </div>

        <div class="sidebar-nav-section">
          <p class="sidebar-nav-title">Orders</p>
          <ul class="sidebar-nav-list">
            <li class="sidebar-nav-item"><a href="orders.html" class="sidebar-nav-link">My Orders</a></li>
            <li class="sidebar-nav-item"><a href="track-order.html" class="sidebar-nav-link">Track Order</a></li>
            <li class="sidebar-nav-item"><a href="order-history.html" class="sidebar-nav-link">Order History</a></li>
          </ul>
        </div>

        <div class="sidebar-nav-section">
          <p class="sidebar-nav-title">Account</p>
          <ul class="sidebar-nav-list">
            <li class="sidebar-nav-item"><a href="profile.html" class="sidebar-nav-link active">Profile</a></li>
            <li class="sidebar-nav-item"><a href="settings.html" class="sidebar-nav-link">Settings</a></li>
            <li class="sidebar-nav-item"><a href="#" class="sidebar-nav-link" onclick="logout(); return false;">Logout (to Landing)</a></li>
          </ul>
        </div>
      </nav>
    </aside>

    <main class="dashboard-main">
      <div class="dashboard-header">
        <div class="dashboard-title">
          <h1>Your Profile</h1>
          <p>Manage your account details</p>
        </div>
      </div>

      <div class="dashboard-card">
        <div class="dashboard-card-header">
          <h3 class="dashboard-card-title">Personal Information</h3>
        </div>
        <div class="dashboard-card-body">
          <form onsubmit="event.preventDefault(); showToast('Profile saved', 'success');">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
              <div class="input-group">
                <label>First name</label>
                <input id="profileFirstName" type="text" placeholder="First name">
              </div>
              <div class="input-group">
                <label>Last name</label>
                <input id="profileLastName" type="text" placeholder="Last name">
              </div>
            </div>
            <div class="input-group" style="margin-top:12px;">
              <label>Email</label>
              <input id="profileEmail" type="email" placeholder="Email">
            </div>
            <div class="input-group" style="margin-top:12px;">
              <label>Phone</label>
              <input id="profilePhone" type="tel" placeholder="+234 ...">
            </div>
            <div style="margin-top:16px;display:flex;gap:10px;flex-wrap:wrap;">
              <button type="submit" class="btn btn-primary">Save changes</button>
              <a href="settings.html" class="btn btn-secondary">Settings</a>
            </div>
          </form>
        </div>
      </div>
    </main>
  </div>

  <script src="../js/main.js"></script>
  <script src="../js/dashboard.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const user = getCurrentUser?.();
      if (!user) return;
      const nameEl = document.getElementById('sidebarUserName');
      if (nameEl) nameEl.textContent = `${user.firstName || 'User'} ${user.lastName || ''}`.trim();
      const av = document.getElementById('sidebarAvatar');
      if (av && user.avatar) av.src = user.avatar;
      document.getElementById('profileFirstName').value = user.firstName || '';
      document.getElementById('profileLastName').value = user.lastName || '';
      document.getElementById('profileEmail').value = user.email || '';
    });
  </script>
</body>
</html>
