<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hire Artisan - Step 1</title>
  <link rel="icon" type="image/png" href="../assets/favicon.png">
  <link rel="apple-touch-icon" href="../assets/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/hire-flow.css">
  <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body data-step="1">
  <div class="toast-container" id="toastContainer"></div>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <div class="dashboard-topbar">
    <div class="dashboard-topbar-left">
      <a href="dashboard.html" class="logo" style="gap:10px; text-decoration:none;">
        <div class="logo-icon"><img src="../assets/app-logo.png" alt="ArtisanConnect"></div>
        <span class="topbar-title">ArtisanConnect</span>
      </a>
    </div>
    <div class="dashboard-topbar-right"></div>
  </div>
  <aside class="dashboard-sidebar" id="dashboardSidebar">
    <div class="sidebar-profile">
      <div class="sidebar-user">
        <img src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=100&h=100&fit=crop" alt="User" class="sidebar-user-avatar">
        <div class="sidebar-user-info">
          <h4>Menu</h4>
          <p>Navigation</p>
        </div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="sidebar-nav-section">
        <p class="sidebar-nav-title">Main</p>
        <ul class="sidebar-nav-list">
          <li class="sidebar-nav-item"><a class="sidebar-nav-link" href="dashboard.html">Dashboard</a></li>
          <li class="sidebar-nav-item"><a class="sidebar-nav-link" href="search.html">Find Artisans</a></li>
          <li class="sidebar-nav-item"><a class="sidebar-nav-link" href="messages.html">Messages</a></li>
        </ul>
      </div>
      <div class="sidebar-nav-section">
        <p class="sidebar-nav-title">Orders</p>
        <ul class="sidebar-nav-list">
          <li class="sidebar-nav-item"><a class="sidebar-nav-link" href="orders.html">My Orders</a></li>
        </ul>
      </div>
      <div class="sidebar-nav-section">
        <p class="sidebar-nav-title">Account</p>
        <ul class="sidebar-nav-list">
          <li class="sidebar-nav-item"><a class="sidebar-nav-link" href="profile.html">Profile</a></li>
          <li class="sidebar-nav-item"><a class="sidebar-nav-link" href="settings.html">Settings</a></li>
          <li class="sidebar-nav-item"><a class="sidebar-nav-link" href="#" onclick="logout(); return false;">Logout</a></li>
        </ul>
      </div>
    </nav>
  </aside>
  <div class="hire-page">
    <div class="hire-container">
      <div class="hire-card">
        <div class="hire-header">
          <div class="step-pill">Step 1 of 4 · Describe Needs</div>
          <h1 class="hire-title">Tell us what you need done</h1>
          <p class="hire-subtitle">Start your hire request with clear details for the artisan.</p>
        </div>

        <div class="artisan-summary">
          <img id="artisanAvatar" alt="Artisan">
          <div>
            <h4 id="artisanName"></h4>
            <p id="artisanService"></p>
          </div>
        </div>

        <form class="hire-form" onsubmit="return false;">
          <div class="input-group">
            <label for="jobNeeds">Describe your job request</label>
            <textarea id="jobNeeds" placeholder="Example: Fix power fluctuation and replace damaged sockets in my apartment."></textarea>
          </div>
          <div class="input-group">
            <label for="jobAddress">Address</label>
            <div class="hire-address-row">
              <input id="jobAddress" type="text" placeholder="Start typing an address…" autocomplete="street-address">
              <button class="hire-locate-btn" id="useMyLocationBtn" type="button" title="Use my current location">Use my location</button>
            </div>
            <div class="hire-address-help" id="hireAddressHelp" style="display:none;"></div>
            <div class="hire-address-map" id="hireAddressMap" style="display:none;"></div>
          </div>
        </form>

        <div class="hire-nav">
          <a class="hire-arrow-btn" href="search.html">← Back to artisans</a>
          <button class="hire-arrow-btn primary" id="nextBtn" type="button">Next →</button>
        </div>
      </div>
    </div>
  </div>
  <script src="../js/main.js"></script>
  <script src="../js/dashboard.js"></script>
  <script src="../js/maps-config.js"></script>
  <script src="../js/google-maps.js"></script>
  <script src="../js/hire-flow.js"></script>
</body>
</html>
