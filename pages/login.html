<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - ArtisanConnect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body>
  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <div class="auth-page">
    <div class="auth-bg">
      <div class="auth-blob auth-blob-1"></div>
      <div class="auth-blob auth-blob-2"></div>
    </div>
    
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <a href="../index.html" class="auth-logo">
            <div class="auth-logo-icon">AC</div>
            ArtisanConnect
          </a>
          
          <div class="auth-tabs">
            <button class="auth-tab active" data-tab="login" onclick="switchTab('login')">Sign In</button>
            <button class="auth-tab" data-tab="register" onclick="switchTab('register')">Sign Up</button>
          </div>
        </div>
        
        <div class="auth-body">
          <!-- Login Form -->
          <form class="auth-form active" id="loginForm" onsubmit="handleLogin(event)">
            <div id="loginError" class="error-message" style="display: none;"></div>
            
            <div class="input-group">
              <label for="loginEmail">Email Address</label>
              <div class="input-wrapper">
                <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="2" y="4" width="20" height="16" rx="2"></rect>
                  <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
                </svg>
                <input type="email" id="loginEmail" placeholder="Enter your email" required>
              </div>
            </div>
            
            <div class="input-group">
              <label for="loginPassword">Password</label>
              <div class="input-wrapper">
                <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
                <input type="password" id="loginPassword" placeholder="Enter your password" required>
                <span class="toggle-password" onclick="togglePassword('loginPassword')">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                  </svg>
                </span>
              </div>
            </div>
            
            <div class="auth-actions">
              <label class="checkbox-group">
                <input type="checkbox" id="rememberMe">
                <span>Remember me</span>
              </label>
              <a href="forgot-password.html" class="forgot-password">Forgot password?</a>
            </div>
            
            <button type="submit" class="auth-submit" id="loginSubmit">
              Sign In
            </button>
          </form>
          
          <!-- Register Form -->
          <form class="auth-form" id="registerForm" onsubmit="handleRegister(event)">
            <div id="registerError" class="error-message" style="display: none;"></div>
            
            <div class="form-row">
              <div class="input-group">
                <label for="registerFirstName">First Name</label>
                <div class="input-wrapper">
                  <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                  </svg>
                  <input type="text" id="registerFirstName" placeholder="First name" required>
                </div>
              </div>
              
              <div class="input-group">
                <label for="registerLastName">Last Name</label>
                <div class="input-wrapper">
                  <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                  </svg>
                  <input type="text" id="registerLastName" placeholder="Last name" required>
                </div>
              </div>
            </div>
            
            <div class="input-group">
              <label for="registerEmail">Email Address</label>
              <div class="input-wrapper">
                <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="2" y="4" width="20" height="16" rx="2"></rect>
                  <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
                </svg>
                <input type="email" id="registerEmail" placeholder="Enter your email" required>
              </div>
            </div>
            
            <div class="input-group">
              <label for="registerPassword">Password</label>
              <div class="input-wrapper">
                <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
                <input type="password" id="registerPassword" placeholder="Create a password" required oninput="checkPasswordStrength()">
                <span class="toggle-password" onclick="togglePassword('registerPassword')">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                  </svg>
                </span>
              </div>
              <div class="password-strength" id="passwordStrength" style="display: none;">
                <div class="strength-bar">
                  <div class="strength-fill" id="strengthFill"></div>
                </div>
                <span class="strength-text" id="strengthText">Password strength</span>
              </div>
            </div>
            
            <div class="input-group">
              <label for="registerConfirmPassword">Confirm Password</label>
              <div class="input-wrapper">
                <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
                <input type="password" id="registerConfirmPassword" placeholder="Confirm your password" required>
              </div>
            </div>
            
            <div class="input-group">
              <label for="registerPhone">Phone Number</label>
              <div class="input-wrapper">
                <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
                </svg>
                <input type="tel" id="registerPhone" placeholder="Enter your phone number">
              </div>
            </div>
            
            <label class="checkbox-group">
              <input type="checkbox" id="agreeTerms" required>
              <span>I agree to the <a href="terms.html">Terms of Service</a> and <a href="privacy.html">Privacy Policy</a></span>
            </label>
            
            <button type="submit" class="auth-submit" id="registerSubmit">
              Create Account
            </button>
          </form>
          
          <!-- Success State -->
          <div class="success-animation" id="successState" style="display: none;">
            <div class="success-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
              </svg>
            </div>
            <h3 class="success-title" id="successTitle">Welcome Back!</h3>
            <p class="success-message" id="successMessage">Redirecting you to your dashboard...</p>
          </div>
        </div>
        
        <div class="auth-footer">
          <p class="auth-footer-text" id="authFooterText">
            Don't have an account? <a href="#" onclick="switchTab('register'); return false;">Sign up</a>
          </p>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/main.js"></script>
  <script src="../js/auth.js"></script>
</body>
</html>
