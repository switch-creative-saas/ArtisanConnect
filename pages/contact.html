<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - ArtisanConnect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/landing.css">
</head>
<body>
  <div class="toast-container" id="toastContainer"></div>
  <nav class="navbar" id="navbar">
    <div class="navbar-container">
      <a href="../index.html" class="logo"><div class="logo-icon">AC</div>ArtisanConnect</a>
      <ul class="nav-links">
        <li><a href="../index.html">Home</a></li>
        <li><a href="search.html">Find Artisans</a></li>
        <li><a href="how-it-works.html">How It Works</a></li>
        <li><a href="about.html">About</a></li>
      </ul>
      <div class="nav-actions"></div>
      <button class="menu-toggle" id="menuToggle" aria-label="Open menu"><span></span><span></span><span></span></button>
    </div>
  </nav>

  <section class="hero" style="min-height:auto;padding:calc(var(--space-3xl) + 40px) 0 var(--space-3xl);">
    <div class="hero-bg">
      <div class="hero-blob hero-blob-1"></div>
      <div class="hero-blob hero-blob-2"></div>
      <div class="hero-blob hero-blob-3"></div>
    </div>
    <div class="hero-container" style="grid-template-columns:1fr;">
      <div class="hero-content" style="max-width:850px;">
        <h1 class="hero-title">Contact <span>Us</span></h1>
        <p class="hero-description">Placeholder contact page for the UI demo.</p>
      </div>
    </div>
  </section>

  <section style="padding:var(--space-3xl) 0;">
    <div class="container">
      <div class="dashboard-card" style="max-width:850px;margin:0 auto;">
        <div class="dashboard-card-body">
          <form onsubmit="event.preventDefault(); showToast('Message sent (demo)', 'success');" style="display:grid;gap:12px;">
            <div class="input-group">
              <label>Name</label>
              <input type="text" placeholder="Your name" required>
            </div>
            <div class="input-group">
              <label>Email</label>
              <input type="email" placeholder="you@example.com" required>
            </div>
            <div class="input-group">
              <label>Message</label>
              <textarea rows="5" placeholder="How can we help?" required style="width:100%;"></textarea>
            </div>
            <button class="btn btn-primary" type="submit">Send message</button>
          </form>
        </div>
      </div>
    </div>
  </section>

  <script src="../js/main.js"></script>
</body>
</html>
