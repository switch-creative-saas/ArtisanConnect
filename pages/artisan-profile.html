<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artisan Profile - ArtisanConnect</title>
  <link rel="icon" type="image/png" href="../assets/favicon.png">
  <link rel="apple-touch-icon" href="../assets/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/dashboard.css">
  <link rel="stylesheet" href="../css/artisan-profile.css">
</head>
<body>
  <div class="toast-container" id="toastContainer"></div>
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

  <div class="dashboard-topbar">
    <div class="dashboard-topbar-left">
      <a href="dashboard.html" class="logo" style="gap:10px; text-decoration:none;">
        <div class="logo-icon"><img src="../assets/app-logo.png" alt="ArtisanConnect"></div>
        <span class="topbar-title">ArtisanConnect</span>
      </a>
    </div>
    <div class="dashboard-topbar-right"></div>
  </div>

  <div class="dashboard">
    <aside class="dashboard-sidebar" id="dashboardSidebar">
      <div class="sidebar-profile">
        <div class="sidebar-user">
          <img src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=100&h=100&fit=crop" alt="User" class="sidebar-user-avatar">
          <div class="sidebar-user-info">
            <h4 id="sidebarUserName">John Doe</h4>
            <p>Client</p>
          </div>
        </div>
      </div>

      <nav class="sidebar-nav">
        <div class="sidebar-nav-section">
          <p class="sidebar-nav-title">Main</p>
          <ul class="sidebar-nav-list">
            <li class="sidebar-nav-item"><a href="dashboard.html" class="sidebar-nav-link">Dashboard</a></li>
            <li class="sidebar-nav-item"><a href="search.html" class="sidebar-nav-link">Find Artisans</a></li>
            <li class="sidebar-nav-item"><a href="messages.html" class="sidebar-nav-link">Messages</a></li>
            <li class="sidebar-nav-item"><a href="favourites.html" class="sidebar-nav-link">Favourites</a></li>
          </ul>
        </div>
        <div class="sidebar-nav-section">
          <p class="sidebar-nav-title">Orders</p>
          <ul class="sidebar-nav-list">
            <li class="sidebar-nav-item"><a href="orders.html" class="sidebar-nav-link">My Orders</a></li>
            <li class="sidebar-nav-item"><a href="track-order.html" class="sidebar-nav-link">Track Order</a></li>
            <li class="sidebar-nav-item"><a href="order-history.html" class="sidebar-nav-link">Order History</a></li>
          </ul>
        </div>
        <div class="sidebar-nav-section">
          <p class="sidebar-nav-title">Account</p>
          <ul class="sidebar-nav-list">
            <li class="sidebar-nav-item"><a href="profile.html" class="sidebar-nav-link">Profile</a></li>
            <li class="sidebar-nav-item"><a href="settings.html" class="sidebar-nav-link">Settings</a></li>
            <li class="sidebar-nav-item"><a href="#" class="sidebar-nav-link" onclick="logout(); return false;">Logout (to Landing)</a></li>
          </ul>
        </div>
      </nav>
    </aside>

    <main class="dashboard-main" style="padding-top: calc(var(--space-xl) + 66px);">
      <div class="artisan-profile-page" id="artisanProfilePage">
        <div class="artisan-profile-hero">
          <div class="artisan-profile-hero-bg">
            <img id="artisanProfileCover" src="" alt="" />
          </div>
          <div class="artisan-profile-hero-content">
            <div class="artisan-profile-header">
              <img id="artisanProfileAvatar" class="artisan-profile-avatar" src="" alt="Artisan">
              <div>
                <h1 id="artisanProfileName" class="artisan-profile-name">Artisan Name</h1>
                <p id="artisanProfileService" class="artisan-profile-service">Service</p>
                <div class="artisan-profile-meta">
                  <span id="artisanProfileRating" class="rating-badge">★ 4.8</span>
                  <span id="artisanProfileLocation" class="meta-dot">Lagos</span>
                </div>
                <div id="artisanProfileTags" class="artisan-profile-tags"></div>
              </div>
            </div>

            <div class="artisan-profile-actions">
              <a id="artisanProfileHireBtn" href="#" class="btn btn-primary">Hire this artisan</a>
              <button class="btn btn-secondary" id="artisanProfileMessageBtn" type="button">Message</button>
            </div>
          </div>
        </div>

        <section class="profile-section">
          <h2>Previous Works</h2>
          <div class="works-grid" id="worksGrid"></div>
        </section>

        <section class="profile-section">
          <h2>Reviews</h2>
          <div class="reviews-grid" id="reviewsGrid"></div>
        </section>
      </div>
    </main>
  </div>

  <script src="../js/main.js"></script>
  <script src="../js/dashboard.js"></script>
  <script src="../js/search.js"></script>
  <script src="../js/artisan-profile.js"></script>
</body>
</html>
