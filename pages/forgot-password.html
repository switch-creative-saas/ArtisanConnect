<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - ArtisanConnect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body>
  <div class="toast-container" id="toastContainer"></div>

  <div class="auth-page">
    <div class="auth-bg">
      <div class="auth-blob auth-blob-1"></div>
      <div class="auth-blob auth-blob-2"></div>
    </div>

    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header" style="text-align:left;">
          <a href="../index.html" class="auth-logo">
            <div class="auth-logo-icon">AC</div>
            ArtisanConnect
          </a>
          <h2 style="margin-top:16px;margin-bottom:6px;">Reset your password</h2>
          <p style="color:var(--text-secondary);margin:0;">This is a UI-only placeholder. It will show a demo confirmation.</p>
        </div>

        <div class="auth-body">
          <form class="auth-form active" onsubmit="event.preventDefault(); showToast('Reset link sent (demo)', 'success'); setTimeout(() => location.href='login.html', 900);">
            <div class="input-group">
              <label>Email Address</label>
              <div class="input-wrapper">
                <input type="email" placeholder="Enter your email" required>
              </div>
            </div>
            <button type="submit" class="auth-submit">Send reset link</button>
          </form>
        </div>

        <div class="auth-footer">
          <p class="auth-footer-text">Remembered your password? <a href="login.html">Sign in</a></p>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/main.js"></script>
</body>
</html>
